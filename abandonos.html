<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Abandonos (Quente)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #F4F6F8; color: #333; padding: 40px 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: #FFF; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 24px; color: #1F1F1F; }
        p.subtitle { color: #555; margin-bottom: 20px; font-size: 14px; }
        .btn-export { background-color: #EF6C00; color: #FFF; border: none; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-export:hover { background-color: #E65100; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px; border-bottom: 1px solid #EAEAEA; font-size: 14px; }
        th { background-color: #F9F9F9; color: #555; font-weight: 600; white-space: nowrap; }
        tr:hover { background-color: #FDFDFD; }
        .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; background-color: #FFF3E0; color: #EF6C00; }
        .empty-state { text-align: center; padding: 40px; color: #888; font-size: 16px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header-row">
            <div>
                <h1>Leads de Abandono (Quentes)</h1>
                <p class="subtitle">Lista de pessoas que preencheram Nome, WhatsApp, responderam a Situação Profissional, mas fecharam a página na última pergunta.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="clearAllAbandonos()" style="background-color: #D32F2F; color: #FFF; border: none; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer;">Limpar Abandonos</button>
                <button class="btn-export" onclick="exportCSV()">Exportar Abandonos</button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>WhatsApp</th>
                        <th>Situação Profissional</th>
                        <th>Interesse Principal (se houver)</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Os dados serão injetados via JS -->
                </tbody>
            </table>
            <div id="empty-state" class="empty-state" style="display: none;">
                Nenhum lead com esse perfil encontrado no momento.
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const senha = prompt("Acesso Restrito: Digite a senha para acessar a lista de abandonos:");
            if (senha !== "sapecoutrairasoft65!") {
                document.body.innerHTML = "<div style='text-align:center; margin-top:100px; font-family:sans-serif;'><h2>Acesso Negado</h2><button onclick='location.reload()' style='margin-top:20px; padding:10px 20px; cursor:pointer;'>Tentar Novamente</button></div>";
                return;
            }
            loadData();
        });

        // Função para filtrar os dados específicos
        function getFilteredLeads() {
            const allLeads = JSON.parse(localStorage.getItem('saved_leads')) || [];
            
            // Filtro exigido: Status "Não finalizado" E tem de ter Nome E tem de ter Whatsapp E tem de ter a Pergunta 3 respondida
            return allLeads.filter(lead => {
                return lead.status === 'Não finalizado' && 
                       lead.perfil !== '' && 
                       lead.nome !== '' && 
                       lead.whatsapp !== '';
            });
        }

        function loadData() {
            const filteredLeads = getFilteredLeads();
            const tbody = document.getElementById('table-body');
            const emptyState = document.getElementById('empty-state');
            
            if (filteredLeads.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            // Inverte array para mostrar os mais novos (fundo da lista orginal) no topo
            filteredLeads.reverse();

            filteredLeads.forEach(lead => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${lead.nome}</td>
                    <td>${lead.whatsapp}</td>
                    <td>${lead.perfil}</td>
                    <td>${lead.assunto || '<span style="color:#aaa;">Não respondeu</span>'}</td>
                    <td>${lead.dataUpdate || '-'}</td>
                    <td><button onclick="deleteLead('${lead.id}')" style="background:none; border:none; color:#D32F2F; cursor:pointer; font-weight:600; font-size:13px;">Excluir</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteLead(id) {
            if(confirm("Tem certeza que deseja excluir esse lead abandonado individualmente?")) {
                let allLeads = JSON.parse(localStorage.getItem('saved_leads')) || [];
                allLeads = allLeads.filter(l => l.id !== id);
                localStorage.setItem('saved_leads', JSON.stringify(allLeads));
                document.getElementById('table-body').innerHTML = ''; // Limpa a UI
                loadData();
            }
        }

        function clearAllAbandonos() {
            if(confirm("ATENÇÃO: Você deseja apagar TODOS os leads classificados como abandono listados aqui? (Os finalizados permanecerão intactos)")) {
                let allLeads = JSON.parse(localStorage.getItem('saved_leads')) || [];
                
                // Filtra para mander APENAS aqueles que NÃO se encaixam como abandono quente
                allLeads = allLeads.filter(lead => {
                    const isAbandono = (lead.status === 'Não finalizado' && lead.perfil !== '' && lead.nome !== '' && lead.whatsapp !== '');
                    return !isAbandono;
                });
                
                localStorage.setItem('saved_leads', JSON.stringify(allLeads));
                document.getElementById('table-body').innerHTML = '';
                loadData();
                alert("Os abandonos foram apagados com sucesso.");
            }
        }

        function exportCSV() {
            const filteredLeads = getFilteredLeads();
            if (filteredLeads.length === 0) {
                alert('Nenhum dado para exportar.');
                return;
            }

            let csvContent = "Nome;WhatsApp;Situacao Profissional;Interesse Principal;Data\n";

            filteredLeads.forEach(lead => {
                const row = [
                    `"${lead.nome || ''}"`,
                    `"${lead.whatsapp || ''}"`,
                    `"${lead.perfil || ''}"`,
                    `"${lead.assunto || ''}"`,
                    `"${lead.dataUpdate || ''}"`
                ].join(";");
                csvContent += row + "\n";
            });

            const universalBOM = "\uFEFF";
            const blob = new Blob([universalBOM + csvContent], { type: 'text/csv;charset=utf-8;' });
            
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `abandonos_quentes_${new Date().getTime()}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
