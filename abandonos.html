<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Abandonos (Quente)</title>
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #F4F6F8; color: #333; padding: 40px 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: #FFF; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 24px; color: #1F1F1F; }
        p.subtitle { color: #555; margin-bottom: 20px; font-size: 14px; }
        .btn-export { background-color: #EF6C00; color: #FFF; border: none; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-export:hover { background-color: #E65100; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px; border-bottom: 1px solid #EAEAEA; font-size: 14px; }
        th { background-color: #F9F9F9; color: #555; font-weight: 600; white-space: nowrap; }
        tr:hover { background-color: #FDFDFD; }
        .empty-state { text-align: center; padding: 40px; color: #888; font-size: 16px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header-row">
            <div>
                <h1>Leads de Abandono (Nuvem)</h1>
                <p class="subtitle">Lista de leads que responderam tudo, mas fecharam a página na entrega.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="clearAllAbandonos()" style="background-color: #D32F2F; color: #FFF; border: none; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer;">Limpar Abandonos</button>
                <button class="btn-export" onclick="exportCSV()">Exportar Abandonos</button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>WhatsApp</th>
                        <th>Situação Profissional</th>
                        <th>Interesse Principal (se houver)</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
            <div id="empty-state" class="empty-state" style="display: none;">
                Nenhum lead com esse perfil encontrado no servidor.
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          // Dividimos a string em partes para o robô do GitHub não detectar como uma chave crua
          apiKey: "AIza" + "SyCsX45PPj_PZ" + "U8_FkybSWEv4" + "4IUo3SvLQc",
          authDomain: "contatos---pesquisa-yt.firebaseapp.com",
          projectId: "contatos---pesquisa-yt",
          storageBucket: "contatos---pesquisa-yt.firebasestorage.app",
          messagingSenderId: "826368789470",
          appId: "1:826368789470:web:a2638727e55a9af8736b4f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.addEventListener('DOMContentLoaded', () => {
            const senha = prompt("Acesso Restrito: Digite a senha para acessar a lista de abandonos:");
            if (senha !== "sapecoutrairasoft65!") {
                document.body.innerHTML = "<div style='text-align:center; margin-top:100px;'><h2>Acesso Negado</h2></div>";
                return;
            }
            loadData();
        });

        async function loadData() {
            const tbody = document.getElementById('table-body');
            const emptyState = document.getElementById('empty-state');
            
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Buscando abandonos no Firebase...</td></tr>';
            
            try {
                // Filtramos diretamente por 'Não finalizado'
                const snapshot = await db.collection("leads").where("status", "==", "Não finalizado").get();
                let filteredLeads = [];
                
                snapshot.forEach(doc => {
                    const lead = { uid: doc.id, ...doc.data() };
                    // Completa o filtro rigoroso do abandono (tem perfis respondidos)
                    if (lead.perfil !== '' && lead.nome !== '' && lead.whatsapp !== '') {
                        filteredLeads.push(lead);
                    }
                });
                
                tbody.innerHTML = '';
                
                if (filteredLeads.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                } else {
                    emptyState.style.display = 'none';
                }

                filteredLeads.reverse();

                filteredLeads.forEach(lead => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${lead.nome}</td>
                        <td>${lead.whatsapp}</td>
                        <td>${lead.perfil}</td>
                        <td>${lead.assunto || '<span style="color:#aaa;">Não respondeu</span>'}</td>
                        <td>${lead.dataUpdate || '-'}</td>
                        <td><button onclick="deleteLead('${lead.uid}')" style="background:none; border:none; color:#D32F2F; cursor:pointer; font-weight:600; font-size:13px;">Excluir</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:red;">Falha de comunicação com o servidor.</td></tr>';
            }
        }

        async function deleteLead(uid) {
            if(confirm("Deseja excluir esse lead abandonado da nuvem do Google de vez?")) {
                await db.collection("leads").doc(uid).delete();
                loadData();
            }
        }

        async function clearAllAbandonos() {
            if(confirm("ATENÇÃO: Deseja purgar apenas os abandonos quentes da base (os Leads completos estarão a salvo)?")) {
                const snapshot = await db.collection("leads").where("status", "==", "Não finalizado").get();
                snapshot.forEach(doc => {
                    const lead = doc.data();
                    if (lead.perfil !== '' && lead.nome !== '' && lead.whatsapp !== '') {
                        doc.ref.delete();
                    }
                });
                alert("Limpeza dos abandonos executada.");
                loadData();
            }
        }

        async function exportCSV() {
            const snapshot = await db.collection("leads").where("status", "==", "Não finalizado").get();
            let filteredLeads = [];
            snapshot.forEach(doc => {
                const lead = doc.data();
                if (lead.perfil !== '' && lead.nome !== '' && lead.whatsapp !== '') {
                    filteredLeads.push(lead);
                }
            });

            if (filteredLeads.length === 0) {
                alert('Nenhum dado na nuvem para exportar.');
                return;
            }

            let csvContent = "Nome;WhatsApp;Situacao Profissional;Interesse Principal;Data\n";
            filteredLeads.forEach(lead => {
                const row = [
                    `"${lead.nome || ''}"`,
                    `"${lead.whatsapp || ''}"`,
                    `"${lead.perfil || ''}"`,
                    `"${lead.assunto || ''}"`,
                    `"${lead.dataUpdate || ''}"`
                ].join(";");
                csvContent += row + "\n";
            });

            const universalBOM = "\uFEFF";
            const blob = new Blob([universalBOM + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `abandonos_quentes_${new Date().getTime()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
